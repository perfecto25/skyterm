name: release

# Build distributable binaries on the free tier (public repo → standard
# GitHub-hosted runners are free, with no OS minute-multiplier).
#
#   * Linux x86_64  → .deb + .rpm   (ubuntu-24.04)
#   * Linux aarch64 → .deb + .rpm   (ubuntu-24.04-arm)
#   * macOS Intel   → .dmg          (macos-13)
#   * macOS Apple   → .dmg          (macos-14)
#
# Push a `vX.Y.Z` tag to build + publish a GitHub Release with all artifacts.
# Run manually (workflow_dispatch) to build + upload artifacts without
# creating a release — useful for testing the pipeline before cutting a tag.
#
# NOTE: skyterm dynamically links GTK4 (a C library), so we build natively on
# each architecture rather than cross-compiling. We also do NOT pass
# `-C target-cpu=native` here (unlike the local package-rpm.sh helper): that
# bakes in the runner's CPU features and would SIGILL on users' older CPUs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install GTK4 + build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libepoxy-dev libfreetype-dev \
            libfontconfig1-dev libglib2.0-dev

      - name: Install packagers (cargo-deb, cargo-generate-rpm)
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build release binary
        # rustc >= 1.90 defaults to the bundled rust-lld linker, which does not
        # search the multiarch lib dirs where the apt GTK4 libs live. Force the
        # GNU linker so -lgtk-4 / -lepoxy / etc. resolve. (Same fix as
        # package-deb.sh.) No target-cpu=native — see header.
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
        run: cargo build --release --locked --package skyterm-gui

      - name: Package .deb
        run: cargo deb --package skyterm-gui --no-build

      - name: Package .rpm
        run: cargo generate-rpm --package skyterm-gui

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-13, arch: x86_64 }   # last Intel runner
          - { runner: macos-14, arch: arm64 }     # Apple Silicon
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install GTK4 + bundling tools (Homebrew)
        run: brew install gtk4 dylibbundler create-dmg librsvg pkgconf

      - name: Build .app bundle + .dmg
        run: ./package-macos.sh --locked

      - name: Tag DMG with architecture
        # package-macos.sh emits Skyterm-<version>.dmg (no arch), identical on
        # both legs — rename so the two DMGs don't collide when collected.
        run: |
          dmg=$(ls target/macos/*.dmg | head -1)
          ver=$(basename "$dmg" .dmg); ver=${ver#Skyterm-}
          mv "$dmg" "target/macos/Skyterm-${ver}-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: target/macos/*.dmg
          if-no-files-found: error

  release:
    name: publish release
    needs: [linux, macos]
    runs-on: ubuntu-latest
    # Only publish a GitHub Release for tag pushes; workflow_dispatch runs just
    # build + upload artifacts so you can test the pipeline first.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lR dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.dmg
          fail_on_unmatched_files: true
